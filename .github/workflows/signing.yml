name: Build and sign

on:
  workflow_dispatch:
  
env:
  BUILD_CONFIGURATION: Release
  DOTNET_VERSION: '9.x'

jobs:
  build-sign-publish:
    runs-on: windows-latest
    environment: nuget-org-publish
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $version = "99.99.99"
          Write-Host "Version: $version"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build
        run: |
          dotnet build Infragistics.QueryBuilder.Executor.csproj `
            -c ${{ env.BUILD_CONFIGURATION }} `
            /p:Version=${{ steps.version.outputs.version }}

      - name: Sign all DLL files
        if: false  # This step will never run
        shell: pwsh
        env:
          CERT_PASS: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          TIMESTAMP_URL: ${{ vars.SIGNING_CERTIFICATE_TIMESTAMP_URL }}
        run: |
          $dllFolder = "${{ github.workspace }}\bin\${{ env.BUILD_CONFIGURATION }}\net9.0"
          $certPath = "${{ github.workspace }}/code-signing-reissue-2023-2026.pfx"
          Write-Host "Signing DLLs in folder: $dllFolder"

          # Find the latest signtool.exe
          Write-Host "##[section]Starting search for signtool.exe at $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss.fff')"
          
          $signtoolPath = $null
          $searchPaths = @(
            "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe",
            "C:\Program Files (x86)\Windows Kits\10\bin\*\x86\signtool.exe",
            "C:\Program Files (x86)\Microsoft SDKs\Windows\*\bin\*\signtool.exe",
            "C:\Program Files (x86)\Microsoft SDKs\Windows\*\bin\signtool.exe"
          )
          
          foreach ($searchPath in $searchPaths) {
            $foundPaths = Get-ChildItem -Path $searchPath -ErrorAction SilentlyContinue | Sort-Object -Property FullName -Descending
            if ($foundPaths) {
              $signtoolPath = $foundPaths[0].FullName
              break
            }
          }
          
          if (-not $signtoolPath) {
            Write-Error "signtool.exe not found in any of the well-known locations"
            exit 1
          }
          
          Write-Host "##[section]Found signtool.exe at $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss.fff')"
          Write-Host "Using signtool at: $signtoolPath"

          $dllFiles = Get-ChildItem -Path $dllFolder -Filter *.dll -Recurse
          foreach ($dll in $dllFiles) {
            Write-Host "Signing $($dll.FullName)..."
            & $signtoolPath sign /f $certPath /p $env:CERT_PASS /tr $env:TIMESTAMP_URL /td sha256 /fd sha256 $dll.FullName

            if ($LASTEXITCODE -ne 0) {
              Write-Error "Signing failed for $($dll.FullName)"
              exit 1
            }
          }

      - name: Pack NuGet package
        shell: pwsh
        run: |
          $packageOutputDir = "${{ github.workspace }}\nupkg"
          $packageVersion = "${{ steps.version.outputs.version }}"

          Write-Host "Packing project from existing build output..."
          dotnet pack ./Infragistics.QueryBuilder.Executor.csproj `
            --no-build `
            --configuration ${{ env.BUILD_CONFIGURATION }} `
            -p:PackageVersion=$packageVersion `
            -o $packageOutputDir

          if ($LASTEXITCODE -ne 0) {
            Write-Error "dotnet pack failed"
            exit 1
          }

      - name: Setup Code Signing Certificate
        shell: pwsh
        run: |
          Write-Host "Setting up code signing certificate..."
          
          # Decode certificate
          $certBase64 = "${{ secrets.SIGNING_CERTIFICATE_2023_2026 }}"
          Write-Host "Base64 string length: $($certBase64.Length)"
          
          try {
            $certBytes = [Convert]::FromBase64String($certBase64)
            Write-Host "Decoded certificate size: $($certBytes.Length) bytes"
          } catch {
            Write-Error "Failed to decode base64 certificate: $_"
            exit 1
          }
          
          # Write to file
          $certPath = Join-Path "${{ runner.temp }}" "certificate.pfx"
          Write-Host "Certificate path: $certPath"
          
          try {
            [System.IO.File]::WriteAllBytes($certPath, $certBytes)
            Write-Host "Certificate file written successfully"
          } catch {
            Write-Error "Failed to write certificate file: $_"
            exit 1
          }
          
          # Verify file exists and has content
          if (-not (Test-Path $certPath)) {
            Write-Error "Certificate file was not created at $certPath"
            exit 1
          }
          
          $fileInfo = Get-Item $certPath
          Write-Host "Certificate file size on disk: $($fileInfo.Length) bytes"
          
          # Test loading the certificate
          $certPassword = "${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}"
          Write-Host "Testing certificate with provided password..."
          
          try {
            # Try to load with explicit flags for ephemeral keys
            $cert = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2(
              $certPath, 
              $certPassword,
              [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::EphemeralKeySet
            )
            Write-Host "✓ Certificate loaded successfully"
            Write-Host "  Subject: $($cert.Subject)"
            Write-Host "  Issuer: $($cert.Issuer)"
            Write-Host "  Thumbprint: $($cert.Thumbprint)"
            Write-Host "  Valid from: $($cert.NotBefore)"
            Write-Host "  Valid until: $($cert.NotAfter)"
            Write-Host "  Has private key: $($cert.HasPrivateKey)"
            
            if (-not $cert.HasPrivateKey) {
              Write-Error "Certificate does not contain a private key!"
              exit 1
            }
            
            if ($cert.NotAfter -lt (Get-Date)) {
              Write-Error "Certificate has expired!"
              exit 1
            }
            
            $cert.Dispose()
          } catch {
            Write-Error "Failed to load certificate: $_"
            Write-Error "Exception type: $($_.Exception.GetType().FullName)"
            Write-Error "HRESULT: $($_.Exception.HResult)"
            exit 1
          }

      - name: Sign NuGet package
        shell: pwsh
        run: |
          $certPath = Join-Path "${{ runner.temp }}" "certificate.pfx"
          $certPassword = "${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}"
          $timestampUrl = "${{ vars.SIGNING_CERTIFICATE_TIMESTAMP_URL }}"
          $packageDir = "${{ github.workspace }}\nupkg"
          
          # Find the package
          $packages = Get-ChildItem "$packageDir\*.nupkg"
          if ($packages.Count -eq 0) {
            Write-Error "No packages found in $packageDir"
            exit 1
          }
          
          $nupkgPath = $packages[0].FullName
          Write-Host "Package to sign: $nupkgPath"
          Write-Host "Package size: $((Get-Item $nupkgPath).Length) bytes"
          Write-Host "Certificate: $certPath"
          Write-Host "Timestamp URL: $timestampUrl"
          
          # Verify certificate file still exists
          if (-not (Test-Path $certPath)) {
            Write-Error "Certificate file not found at $certPath"
            exit 1
          }
          
          Write-Host "Starting NuGet sign process..."
          
          # Use explicit parameter format
          $signArgs = @(
            'nuget', 'sign', $nupkgPath,
            '--certificate-path', $certPath,
            '--certificate-password', $certPassword,
            '--timestamper', $timestampUrl,
            '--overwrite',
            '--verbosity', 'detailed'
          )
          
          & dotnet @signArgs
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "NuGet signing failed with exit code: $LASTEXITCODE"
            exit 1
          }
          
          Write-Host "✓ Package signed successfully"
    
      - name: Sign NuGet package (using nuget cli)
        continue-on-error: true
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          SIGNING_CERTIFICATE_TIMESTAMP_URL: ${{ vars.SIGNING_CERTIFICATE_TIMESTAMP_URL }}
        run: |
          $certPath = "${{ github.workspace }}/code-signing-reissue-2023-2026.pfx"
          $nupkgPath = "${{ github.workspace }}\nupkg\*.nupkg"
          nuget sign $nupkgPath -CertificatePath $certPath -CertificatePassword "$env:SIGNING_CERTIFICATE_PASSWORD" -Timestamper "$env:SIGNING_CERTIFICATE_TIMESTAMP_URL" -Verbosity detailed
          Write-Host "Package signing completed"

      - name: Sign NuGet package (using dotnet nuget sign)
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          SIGNING_CERTIFICATE_TIMESTAMP_URL: ${{ vars.SIGNING_CERTIFICATE_TIMESTAMP_URL }}
        run: |
          $certPath = "${{ github.workspace }}/code-signing-reissue-2023-2026.pfx"
          $nupkgPath = "${{ github.workspace }}\nupkg\*.nupkg"
          
          dotnet nuget sign $nupkgPath `
            --certificate-path $certPath `
            --certificate-password "$env:SIGNING_CERTIFICATE_PASSWORD" `
            --timestamper "$env:SIGNING_CERTIFICATE_TIMESTAMP_URL" `
            --overwrite `
            --verbosity detailed

      - name: NuGet login (OIDC Trusted Publishing)
        uses: nuget/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_ORG_USER }}

      - name: Clean up certificate
        if: always()
        shell: pwsh
        run: |
          $certPath = "${{ github.workspace }}/code-signing-reissue-2023-2026.pfx"
          if (Test-Path $certPath) {
            Remove-Item $certPath -Force
            Write-Host "Certificate cleaned up"
          }
